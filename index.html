<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaMart USA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">🛍️ NovaMart USA</div>

<input type="text" id="search" placeholder="Search products...">

<button id="darkModeBtn">🌙</button>

<button onclick="openWishlist()">

❤️ <span id="wishlistCount">0</span>

</button>

<div class="cart" onclick="openCart()">

🛒 <span id="cartCount">0</span>

</div>

</header>

<section class="hero">

<section class="categories">

<button onclick="filterCategory('all')">All</button>

<button onclick="filterCategory('Clothes')">Clothes</button>

<button onclick="filterCategory('Shoes')">Shoes</button>

<button onclick="filterCategory('Groceries')">Groceries</button>

</section>

<h1>Welcome to NovaMart USA</h1>

<p>Shop premium products with fast delivery across the USA.</p>

</section>

<section class="products" id="productList"></section>

<!-- Wishlist -->

<div id="wishlistModal" class="modal">

<div class="modal-content">

<h2>❤️ My Wishlist</h2>

<div id="wishlistItems"></div>

<button onclick="closeWishlist()">Close</button>

</div>

</div>

<!-- Cart -->

<div id="cartModal" class="modal">

<div class="modal-content">

<h2>Your Shopping Cart</h2>

<div id="cartItems"></div>

<h3 id="totalPrice">$0.00</h3>

<button onclick="checkout()">

Checkout via WhatsApp

</button>

<button onclick="closeCart()">

Continue Shopping

</button>

</div>

</div>

<footer>

<p>© 2026 NovaMart USA</p>

<p>Customer Support:</p>

<p>WhatsApp: +1 (910) 909-0329</p>

</footer>

<script src="script.js"></script>

</body>

</html>
