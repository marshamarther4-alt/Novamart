<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaMart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <div class="logo">NovaMart</div>

  <input type="text" id="search" placeholder="Search products...">
<button id="darkModeBtn">🌙</button>

<button onclick="openWishlist()">

❤️ <span id="wishlistCount">0</span>

</button>
  <div class="cart" onclick="openCart()">

    🛒 <span id="cartCount">0</span>

  </div>

</header>

<section class="hero">
<section class="categories">

<button onclick="filterCategory('all')">All</button>

<button onclick="filterCategory('Clothes')">Clothes</button>

<button onclick="filterCategory('Shoes')">Shoes</button>

<button onclick="filterCategory('Groceries')">Groceries</button>

</section>
  <h1>Welcome to NovaMart</h1>

  <p>Shop 50 real products instantly</p>

</section>

<section class="products" id="productList"></section>

<!-- CART -->

<div id="cartModal" class="modal">

  <div class="modal-content">

    <h2>Your Cart</h2>

    <div id="cartItems"></div>

    <h3 id="totalPrice"></h3>

    <button onclick="checkout()">Checkout on WhatsApp</button>

    <button onclick="closeCart()">Close</button>

  </div>

</div>

<script src="script.js"></script>

</body>

</html>
