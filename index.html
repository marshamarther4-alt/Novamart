<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaMart V6 Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <div class="logo">NovaMart V6</div>

  <input type="text" id="search" placeholder="Search products...">

  <div class="cart" onclick="openCart()">

    🛒 <span id="cartCount">0</span>

  </div>

</header>

<section class="hero">

  <h1>NovaMart Pro Store</h1>

  <p>Shop smarter. Faster. Better.</p>

</section>

<section class="filter">

  <button onclick="filterCategory('all')">All</button>

  <button onclick="filterCategory('shoes')">Shoes</button>

  <button onclick="filterCategory('clothes')">Clothes</button>

  <button onclick="filterCategory('others')">Others</button>

</section>

<section class="products" id="productList"></section>

<!-- PRODUCT MODAL -->

<div id="productModal" class="modal">

  <div class="modal-content">

    <h2 id="modalName"></h2>

    <img id="modalImg" />

    <p id="modalPrice"></p>

    <div class="qty">

      <button onclick="changeQty(-1)">-</button>

      <span id="qty">1</span>

      <button onclick="changeQty(1)">+</button>

    </div>

    <button onclick="addToCartFromModal()">Add to Cart</button>

    <button onclick="closeProduct()">Close</button>

  </div>

</div>

<!-- CART -->

<div id="cartModal" class="modal">

  <div class="modal-content">

    <h2>Your Cart</h2>

    <div id="cartItems"></div>

    <h3 id="totalPrice"></h3>

    <button onclick="checkout()">Order on WhatsApp</button>

    <button onclick="closeCart()">Close</button>

  </div>

</div>

<script src="script.js"></script>

</body>

</html>
